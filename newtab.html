<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="newtab.css" />
    <link rel="icon" type="image/png" href="assets/chop.png" />
    <script src="newtab.js" defer></script>
  </head>
  <body>
    <canvas id="fluid-canvas"></canvas>
     <main class="wrap">
      <!--<div id="greeting" class="greeting"></div>-->
      <div id="clock" class="clock"></div>
      <header class="top">
        <div class="actions">
          <form id="searchForm" class="searchForm">
            <input id="q" class="search" placeholder="search." />
          </form>
        </div>
         
      </header>

      <section class="card">
        <div id="links" class="grid"></div>
      </section>
      <footer class="bottom">
      <div class="actions">
          <form id="bingForm" class="searchForm">
            <input id="bingQ" class="search" placeholder="bing." />
          </form>
        </div>
        </footer>
    </main>
  </body>
</html>
